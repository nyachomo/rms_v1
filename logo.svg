<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <path id="topArc"    d="M 55,250 A 195,195 0 0,1 445,250"/>
    <path id="bottomArc" d="M 250,250 m -175,0 a 175,175 0 0,0 350,0"/>
  </defs>

  <!-- ── Outer rings ── -->
  <circle cx="250" cy="250" r="245" fill="#f2f2f2" stroke="#2b2b6d" stroke-width="4.5"/>
  <circle cx="250" cy="250" r="226" fill="none"    stroke="#2b2b6d" stroke-width="1.8"/>

  <!-- ── Inner content circle ── -->
  <circle cx="250" cy="250" r="172" fill="#e8e8eb" stroke="#2b2b6d" stroke-width="1.2"/>

  <!-- ── Side bullet dots ── -->
  <circle cx="27"  cy="260" r="12" fill="#2b2b6d"/>
  <circle cx="473" cy="260" r="12" fill="#2b2b6d"/>

  <!-- ── Top curved text ── -->
  <text font-size="19" font-weight="900"
        font-family="'Arial Black',Arial,sans-serif"
        fill="#fe730c" letter-spacing="5.5">
    <textPath href="#topArc" startOffset="3%">TECHSPHERE  DIGITAL  SKILLS</textPath>
  </text>

  <!-- ── Bottom curved text ── -->
  <text font-size="21" font-weight="900"
        font-family="'Arial Black',Arial,sans-serif"
        fill="#fe730c" letter-spacing="13">
    <textPath href="#bottomArc" startOffset="24%">ACADEMY</textPath>
  </text>

  <!-- ═══════════════════════════════════
       SUN RAYS  – radiating from (250,215)
       ═══════════════════════════════════ -->
  <g fill="#fe730c">
    <!-- top -->
    <polygon points="246,193 254,193 250,152"/>
    <!-- top-right cluster -->
    <polygon points="254,194 261,190 268,151"/>
    <polygon points="261,197 269,192 284,156"/>
    <polygon points="268,204 277,200 297,167"/>
    <polygon points="274,213 282,209 307,180"/>
    <!-- right -->
    <polygon points="279,224 282,233 320,222"/>
    <polygon points="280,237 282,246 318,239"/>
    <!-- top-left cluster -->
    <polygon points="246,194 239,190 232,151"/>
    <polygon points="239,197 231,192 216,156"/>
    <polygon points="232,204 223,200 203,167"/>
    <polygon points="226,213 218,209 193,180"/>
    <!-- left -->
    <polygon points="221,224 218,233 180,222"/>
    <polygon points="220,237 218,246 182,239"/>
  </g>

  <!-- ═══════════════════════════════════
       LEFT HAND (navy)
       ═══════════════════════════════════ -->
  <path d="
    M 155,355
    C 122,330 100,290 106,252
    C 110,220 130,200 158,196
    C 178,193 196,203 208,220
    C 218,234 220,253 215,270
    C 212,280 208,288 210,300
    C 213,318 222,340 226,362
    C 203,368 175,364 158,354
    Z"
    fill="#2b2b6d"/>

  <!-- ═══════════════════════════════════
       RIGHT HAND (navy)
       ═══════════════════════════════════ -->
  <path d="
    M 345,355
    C 378,330 400,290 394,252
    C 390,220 370,200 342,196
    C 322,193 304,203 292,220
    C 282,234 280,253 285,270
    C 288,280 292,288 290,300
    C 287,318 278,340 274,362
    C 297,368 325,364 342,354
    Z"
    fill="#2b2b6d"/>

  <!-- ═══════════════════════════════════
       TEAL ELEMENT – stylised open wings
       ═══════════════════════════════════ -->
  <!-- left wing -->
  <path d="
    M 250,288
    C 232,268 205,255 178,258
    C 161,260 150,271 155,283
    C 160,295 178,297 200,292
    C 222,287 240,284 250,288 Z"
    fill="#53b9c6"/>
  <!-- right wing -->
  <path d="
    M 250,288
    C 268,268 295,255 322,258
    C 339,260 350,271 345,283
    C 340,295 322,297 300,292
    C 278,287 260,284 250,288 Z"
    fill="#53b9c6"/>
  <!-- centre upward stem -->
  <path d="
    M 243,288
    C 241,270 244,252 250,236
    C 256,252 259,270 257,288
    Z"
    fill="#53b9c6"/>

  <!-- ═══════════════════════════════════
       GRADUATION CAP
       ═══════════════════════════════════ -->
  <!-- Mortarboard brim -->
  <polygon points="250,200 210,218 250,236 290,218" fill="#fe730c"/>
  <!-- Cap top block -->
  <rect x="234" y="192" width="32" height="10" rx="2" fill="#2b2b6d"/>
  <!-- Tassel string + ball -->
  <line x1="290" y1="218" x2="299" y2="238" stroke="#2b2b6d" stroke-width="2.8"/>
  <circle cx="299" cy="242" r="5" fill="#2b2b6d"/>
</svg>
